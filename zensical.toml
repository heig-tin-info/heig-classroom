[project]
site_name = "HEIG Classroom"
site_description = "GitHub-backed assignments for the TIN department at HEIG-VD: student repositories, CI grading, automatic deadlines."
site_author = "Yves Chevallier"
site_url = "https://heig-tin-info.github.io/heig-classroom/"
repo_url = "https://github.com/heig-tin-info/heig-classroom"
copyright = """
Copyright &copy; 2026 HEIG-VD, TIN department
"""

nav = [
  { "Home" = "index.md" },
  { "Guide" = [
    { "About" = "guide/about.md" },
    { "GitHub applications" = "guide/github-apps.md" },
  ] },
  { "Development" = [
    "development/index.md",
    { "Analyse des besoins" = "00-analyse-besoins.md" },
    { "Cahier des charges" = "01-cahier-des-charges.md" },
    { "Spécifications fonctionnelles" = "02-specs-fonctionnelles.md" },
    { "Architecture" = "03-architecture.md" },
    { "Spike S2 — provisionnement" = "spikes/S2-rapport.md" },
  ] },
]

[project.theme]
language = "en"
features = [
  "content.code.copy",
  "content.footnote.tooltips",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[project.theme.icon]
logo = "lucide/graduation-cap"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/heig-tin-info/heig-classroom"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
