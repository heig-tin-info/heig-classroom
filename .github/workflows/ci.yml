name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

  # Production image, built HERE and pushed to GHCR: the 453 MiB / 1 CPU VM
  # must never build again (an on-VM build starves Postgres — deploy.md §7).
  image:
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # :latest for the regular deploy, :<sha> kept for rollbacks.
          tags: |
            ghcr.io/heig-tin-info/heig-classroom:latest
            ghcr.io/heig-tin-info/heig-classroom:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy = ssh + compose pull + up -d (a few seconds, zero contention).
  # Requires the DEPLOY_SSH_KEY secret (private key whose public half is in
  # the VM's authorized_keys); without it the job no-ops so the pipeline
  # stays green while the key is not provisioned yet.
  deploy:
    needs: image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    concurrency:
      group: prod-deploy
      cancel-in-progress: false
    env:
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
    steps:
      - name: Skip when the deploy key is not configured
        if: env.DEPLOY_SSH_KEY == ''
        run: echo "::notice::DEPLOY_SSH_KEY secret not set — image pushed, deploy skipped."
      - name: Set up SSH (pinned host key)
        if: env.DEPLOY_SSH_KEY != ''
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo 'classroom.chevallier.io ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDlhwwqTDukdVfgHNPbi6hTovwF1MhZEKnDj7NSdHYQl' >> ~/.ssh/known_hosts
      - name: Pull image and restart (no build on the VM)
        if: env.DEPLOY_SSH_KEY != ''
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh root@classroom.chevallier.io "
            set -eu
            cd /opt/heig-classroom
            git pull --ff-only
            echo '$GHCR_TOKEN' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
            docker compose -f compose.prod.yml --env-file .env.prod pull app
            docker compose -f compose.prod.yml --env-file .env.prod up -d
            docker image prune -f
          "
