# Keyless deploy fallback: builds the production image and publishes it as a
# run artifact, so an operator can `gh run download` it and `docker load` it
# on the VM without any registry credentials. The normal path is the CI
# image+deploy jobs (ci.yml); this exists for bootstrap and emergencies.
name: Image artifact

on:
  workflow_dispatch:

jobs:
  image-tar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          tags: ghcr.io/heig-tin-info/heig-classroom:latest
          outputs: type=docker,dest=/tmp/hgc-image.tar
          cache-from: type=gha
      - uses: actions/upload-artifact@v7
        with:
          name: hgc-image
          path: /tmp/hgc-image.tar
          compression-level: 6
          retention-days: 3
