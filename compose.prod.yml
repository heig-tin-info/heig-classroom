# Production -- classroom.chevallier.io
# Caddy runs NATIVELY on the host (see deploy.md): only loopback ports
# are published here. Start with:
#   docker compose -f compose.prod.yml --env-file .env.prod up -d --build
services:
  app:
    build: .
    image: hgc-server:prod
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: postgres://hgc:${POSTGRES_PASSWORD:?}@postgres:5432/hgc
      PUBLIC_URL: https://classroom.chevallier.io
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000" # native Caddy -> reverse_proxy localhost:3000
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: hgc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: hgc
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hgc"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Daily pg_dump to ./backups (NFR-16: RPO 24 h); 30-day retention.
  # The OFF-VM copy (rclone to external storage) still needs wiring -- see
  # deploy.md, Backups section.
  backup:
    image: postgres:17
    restart: always
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?}
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - bash
      - -c
      - |
        while true; do
          pg_dump -Fc -h postgres -U hgc hgc > "/backups/hgc-$(date +%F).dump.tmp" \
            && mv "/backups/hgc-$(date +%F).dump.tmp" "/backups/hgc-$(date +%F).dump"
          ls -1t /backups/hgc-*.dump 2>/dev/null | tail -n +31 | xargs -r rm --
          sleep 86400
        done

  # Fallback IdP (edu-ID is approved: disabled by default).
  # Enable when needed: docker compose --profile keycloak ... up -d
  keycloak:
    profiles: ["keycloak"]
    image: quay.io/keycloak/keycloak:26.4
    restart: always
    command: start --import-realm --proxy-headers xforwarded --http-enabled true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-disabled}
      KC_HOSTNAME: https://classroom.chevallier.io/kc
      KC_HTTP_RELATIVE_PATH: /kc
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
      - keycloak-data:/opt/keycloak/data/h2

volumes:
  pgdata:
  keycloak-data:
